<body>
    <script>
        function aprekinatCenu(cena, atlaide){
            aprekinataCena = cena-(cena*atlaide/100)
            return "Gala cena ar "+atlaide+"% atlaidi ir "+aprekinataCena
        }
        console.log(aprekinatCenu(20, 50));
        console.log(aprekinatCenu(50, 25));
        console.log(aprekinatCenu(5, 70));
    </script>
</body>
