<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JS Beat Sampler</title>
    <link rel="stylesheet" href="stils.css">
</head>

<body>

    <h1>Web-sampleris</h1>
    <div class="pad-container">
        <div class="pad-wrapper">
            <div id="kick" class="pad">KICK</div>
            <input type="file" id="kickUpload" accept="audio/*" class="upload-btn">
        </div>
        <div class="pad-wrapper">
            <div id="snare" class="pad">SNARE</div>
            <input type="file" id="snareUpload" accept="audio/*" class="upload-btn">
        </div>
        <div class="pad-wrapper">
            <div id="hihat" class="pad">HI-HAT</div>
            <input type="file" id="hihatUpload" accept="audio/*" class="upload-btn">
        </div>
    </div>

    <div class="controls">
        <button id="playBtn">ATSKAŅOT</button>
    </div>

    <script src="sampler.js"></script>
</body>

</html>
