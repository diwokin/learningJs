<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Beat Sampler</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        .pad-container { display: flex; gap: 20px; margin-top: 50px; }
        .pad { width: 100px; height: 100px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .recording { background: #ff4444; border-color: white; }
        .has-sound { border-color: #00ff88; color: #00ff88; }
        .controls { margin-top: 40px; }
        button { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Web Sampler</h1>
    <div class="pad-container">
        <div id="kick" class="pad">KICK</div>
        <div id="snare" class="pad">SNARE</div>
        <div id="hihat" class="pad">HI-HAT</div>
    </div>

    <div class="controls">
        <button id="playBtn">START BEAT</button>
    </div>

    <script src="sampler.js"></script>
</body>
</html>
